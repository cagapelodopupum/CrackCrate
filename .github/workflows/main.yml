name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: mvn clean package
        working-directory: crate-plugin
      - uses: actions/upload-artifact@v3
        with:
          name: CrackCrate
          path: crate-plugin/target/CrackCrate-1.0.0.jar
