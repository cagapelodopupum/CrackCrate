###################################
#        CrackCrate Config        #
###################################

# Configurações gerais
settings:
  animation-duration: 3
  animation-type: SPIN
  sound-enabled: true
  particles-enabled: true
  broadcast-rare: true
  rare-threshold: 5.0

# Mensagens
messages:
  prefix: "&8[&6CrackCrate&8] &r"
  no-permission: "&cVocê não tem permissão para isso!"
  crate-opened: "&aVocê abriu uma &e%crate% &ae ganhou &6%reward%&a!"
  no-key: "&cVocê não tem chave para esta crate!"
  key-given: "&aChave de &e%crate% &adada para &6%player%&a! (x%amount%)"
  key-received: "&aVocê recebeu &e%amount%x &6Chave de %crate%&a!"
  invalid-crate: "&cCrate &e%crate% &cnão encontrada!"
  reload-done: "&aPlugin recarregado com sucesso!"
  broadcast-rare: "&6» &e%player% &6abriu uma &e%crate% &6e ganhou &c%reward%&6! (%.1f%%)"
  location-set: "&aLocalização da crate &e%crate% &adefinida!"
  not-a-crate: "&cEsta crate não existe ou não está configurada!"

